<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>OmniMesh Core — Sovereign AI Fabric</title>
  <meta name="description" content="OmniMesh: distributed sovereign AI assistant — turn your LAN into a private AI cluster.">
  <meta name="theme-color" content="#020a12">

  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/styles/hud.css">
</head>
<body>
  <canvas id="grid-canvas"></canvas>
  <div id="scanlines"></div>
  <div id="sweep"></div>
  <div id="vignette"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);
      const s = 60;
      ctx.lineWidth = 0.5;

      ctx.strokeStyle = 'rgba(0,212,255,0.06)';
      for (let x = 0; x < W; x += s) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += s) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      const time = t * 0.0004;
      for (let x = 0; x <= W; x += s) {
        for (let y = 0; y <= H; y += s) {
          const phase = (x * 0.02 + y * 0.015 + time);
          const a = Math.sin(phase) * 0.5 + 0.5;
          ctx.beginPath();
          ctx.arc(x, y, 1.3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,212,255,${0.05 + a * 0.15})`;
          ctx.fill();
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
