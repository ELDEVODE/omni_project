name: build-binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build omni (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            out: omni-darwin-arm64
            ext: tar.gz
          - os: macos-14
            target: darwin-x64
            out: omni-darwin-x64
            ext: tar.gz
          - os: ubuntu-22.04
            target: linux-x64
            out: omni-linux-x64
            ext: tar.gz
          - os: ubuntu-22.04-arm
            target: linux-arm64
            out: omni-linux-arm64
            ext: tar.gz
          - os: windows-2022
            target: windows-x64
            out: omni-windows-x64
            ext: zip
    steps:
      - uses: actions/checkout@v6

      - name: Disable autocrlf
        run: git config --global core.autocrlf false
        shell: bash

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build dashboard
        run: bun run --cwd packages/web build

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.out }}
          bun build packages/cli/src/index.ts \
            --compile \
            --target bun-${{ matrix.target }} \
            --external @qvac/sdk \
            --outfile=dist/${{ matrix.out }}/omni${{ matrix.target == 'windows-x64' && '.exe' || '' }}

          # Bundle the dashboard assets alongside the executable
          cp -r packages/web/dist dist/${{ matrix.out }}/web

      - name: Package tarball/zip
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.ext }}" = "zip" ]; then
            if command -v zip >/dev/null 2>&1; then
              zip -r ${{ matrix.out }}.zip ${{ matrix.out }}
            else
              powershell -NoProfile -Command "Compress-Archive -Path '${{ matrix.out }}' -DestinationPath '${{ matrix.out }}.zip' -Force"
            fi
          else
            tar -czf ${{ matrix.out }}.tar.gz ${{ matrix.out }}
          fi

      - name: Compute SHA-256
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.ext }}" = "zip" ]; then
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum ${{ matrix.out }}.zip
            else
              shasum -a 256 ${{ matrix.out }}.zip
            fi
          else
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum ${{ matrix.out }}.tar.gz
            else
              shasum -a 256 ${{ matrix.out }}.tar.gz
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: omni-${{ matrix.out }}
          path: dist/${{ matrix.out }}.*
          if-no-files-found: error

  checksums:
    name: Aggregate SHA-256 sums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Write checksums.txt
        shell: bash
        run: |
          cd artifacts
          : > checksums.txt
          for d in */; do
            [ -d "$d" ] || continue
            for f in "$d"*; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if command -v sha256sum >/dev/null 2>&1; then
                (cd "$d" && sha256sum "$base") >> checksums.txt
              else
                (cd "$d" && shasum -a 256 "$base") >> checksums.txt
              fi
            done
          done
          cat checksums.txt

      - name: Upload checksums.txt
        uses: actions/upload-artifact@v7
        with:
          name: omni-checksums
          path: artifacts/checksums.txt
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          cd artifacts
          for d in */; do
            [ "$d" = "*/" ] && continue
            [ "$d" = "checksums.txt/" ] && continue
            if [ -d "$d" ]; then
              for f in "$d"*; do
                [ -f "$f" ] || continue
                mv "$f" .
              done
              rmdir "$d" 2>/dev/null || true
            fi
          done
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.get_version.outputs.version }}
          files: |
            artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
