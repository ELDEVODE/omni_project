name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Disable autocrlf
        run: git config --global core.autocrlf false
        shell: bash

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Verify install.sh syntax
        if: runner.os != 'Windows'
        run: bash -n docs/install.sh

      - name: 'Smoke: omni --help'
        run: bun run packages/cli/src/index.ts --help

      - name: 'Smoke: omni doctor'
        run: bun run packages/cli/src/index.ts doctor
