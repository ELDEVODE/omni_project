version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      bun:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(bun)"
    labels:
      - "dependencies"
      - "bot"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(actions)"
    labels:
      - "dependencies"
      - "ci"
      - "bot"
